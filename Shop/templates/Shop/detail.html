<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ product.title }}</title>
</head>
<body>
    <nav>
        <a href="{% url 'shop:index' %}">← Назад к списку товаров</a>
    </nav>
    <hr>

    <h1>{{ product.title }}</h1>
    <p><strong>Описание:</strong> {{ product.content|default:"Описание отсутствует" }}</p>
    <p><strong>Цена:</strong> {{ product.price }} руб.</p>
    <p><strong>Количество на складе:</strong> {{ product.count }}</p>

    <hr>
    <footer>
        <small>Дата публикации: {{ product.published|date:"d.m.Y H:i" }}</small>
    </footer>
</body>
</html>
