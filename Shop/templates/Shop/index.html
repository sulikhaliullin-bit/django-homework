<form method="get" action="{% url 'index' %}">
    <input type="text" name="q" placeholder="Поиск курса..." value="{{ request.GET.q }}">
    <button type="submit">Найти</button>
</form>

<hr>

{% for course in courses %}
    <h2>{{ course.title }}</h2>
    <p>{{ course.description }}</p>
{% empty %}
    <p>Курсы не найдены.</p>
{% endfor %}
