<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список задач</title>
</head>
<body>
    <nav>
        <a href="{% url 'task_list' %}">Главная</a> |
        <a href="{% url 'task_create' %}">Добавить задачу</a>
    </nav>
    <hr>
    <h1>Все задачи</h1>
    <ul>
        {% for task in tasks %}
            <li>
                <strong>{{ task.title }}</strong>
                <a href="{% url 'task_detail' task.pk %}">Подробнее</a> |
                <a href="{% url 'task_delete' task.pk %}">Удалить</a>
            </li>
        {% empty %}
            <li>Задач пока нет.</li>
        {% endfor %}
    </ul>
</body>
</html>
