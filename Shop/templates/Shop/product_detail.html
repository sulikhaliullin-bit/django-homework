<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ product.name }}</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h1 class="display-4">{{ product.name }}</h1>
                <p class="text-muted">Дата добавления: {{ product.created_at|date:"d.m.Y" }}</p>
                <hr>
                <p class="lead">{{ product.description }}</p>
                <h3 class="text-primary">{{ product.price }} руб.</h3>
                <p class="mt-3">Остаток на складе: <strong>{{ product.quantity }}</strong></p>
                <a href="{% url 'index' %}" class="btn btn-secondary mt-3">← Назад к списку</a>
            </div>
        </div>
    </div>
</body>
</html>
