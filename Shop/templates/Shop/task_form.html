<!DOCTYPE html>
<html>
<head><title>Новая задача</title></head>
<body>
    <h1>Добавить задачу</h1>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Заголовок" required><br><br>
        <textarea name="description" placeholder="Описание"></textarea><br><br>
        <button type="submit">Сохранить</button>
    </form>
    <a href="{% url 'book_list' %}">Отмена</a>
</body>
</html>
