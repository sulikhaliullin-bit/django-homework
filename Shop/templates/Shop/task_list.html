<h1>Список книг</h1>
<a href="{% url 'book_create' %}">Добавить книгу</a>
<form method="GET">
    <input type="text" name="q" placeholder="Поиск...">
    <button type="submit">Найти</button>
</form>
<ul>
    {% for book in books %}
        <li>{{ book.title }} — <a href="{% url 'book_detail' book.id %}">Подробнее</a></li>
    {% endfor %}
</ul>
