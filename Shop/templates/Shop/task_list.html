<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список уроков</title>
</head>
<body>
    <h1>Список уроков</h1>
    <ul>
        {% for lesson in lessons %}
            <li>{{ lesson.title }}</li>
        {% empty %}
            <li>Уроков пока нет. Добавьте их в админке.</li>
        {% endfor %}
    </ul>

    <div>
        Страница {{ current_page }}
    </div>
</body>
</html>
